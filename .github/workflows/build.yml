name: Build AutoTyper APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Clean and Build Debug APK
      run: |
        cd android-autotyper
        chmod +x gradlew
        ./gradlew clean assembleDebug --no-daemon --stacktrace

    - name: Find and Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AutoTyper-Package-Fixed
        path: android-autotyper/app/build/outputs/apk/debug/*.apk
        retention-days: 30
