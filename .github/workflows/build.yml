name: Build AutoTyper APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Alag se gradle download karne ke bajaye direct GitHub ka standard action use karenge
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build Debug APK
      run: |
        cd android-autotyper
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace
