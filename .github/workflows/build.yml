name: Build AutoTyper APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Ye step direct runner me global gradle command install kar dega
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # Ab hum gradlew script ko chhor kar direct 'gradle' command chalayenge
    - name: Build Debug APK
      run: |
        cd android-autotyper
        gradle assembleDebug --no-daemon --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: AutoTyper-Debug-APK
        path: android-autotyper/app/build/outputs/apk/debug/*.apk
        retention-days: 30
