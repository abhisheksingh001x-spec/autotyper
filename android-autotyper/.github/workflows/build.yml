name: Build AutoTyper APK

# Trigger: push pe, ya manually "Run workflow" button se
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # GitHub pe jaake manually bhi chala sakte ho

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # Step 1: Code checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Java 17 setup (Android build ke liye required)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Gradle wrapper JAR generate karo (ye JAR commit nahi karna padta)
      - name: Generate Gradle Wrapper JAR
        run: |
          sudo apt-get install -y gradle --quiet
          gradle wrapper --gradle-version=8.6 --distribution-type=bin
          chmod +x gradlew

      # Step 4: Android SDK cache (build fast hoti hai)
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle-wrapper.properties') }}
          restore-keys: gradle-

      # Step 5: Debug APK build karo
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # Step 6: APK upload karo as artifact (download kar sakte ho)
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoTyper-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # 30 din tak download available rahega
